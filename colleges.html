<!DOCTYPE html>
<html lang="en">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-5HVBHX1KDW"></script>
    <script>window.dataLayer = window.dataLayer || []; function gtag(){dataLayer.push(arguments);} gtag('js', new Date()); gtag('config', 'G-5HVBHX1KDW');</script>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1495090071076386" crossorigin="anonymous"></script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Filter and discover top engineering, medical, and global institutions.">
    <title>College Matrix | CareerPilot</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700;900&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        :root { --bg-deep: #020617; --glass-base: rgba(15, 23, 42, 0.6); --glass-border: rgba(255, 255, 255, 0.08); --neon-primary: #3B82F6; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg-deep); color: #F8FAFC; font-family: 'Inter', sans-serif; display: flex; flex-direction: column; min-height: 100vh; }
        .grid-bg { position: fixed; inset: 0; background-image: linear-gradient(var(--glass-border) 1px, transparent 1px), linear-gradient(90deg, var(--glass-border) 1px, transparent 1px); background-size: 30px 30px; z-index: -2; opacity: 0.3; }
        
        nav { position: sticky; top: 0; width: 100%; padding: 15px 30px; background: rgba(2, 6, 23, 0.85); backdrop-filter: blur(20px); display: flex; justify-content: space-between; align-items: center; z-index: 1000; border-bottom: 1px solid var(--glass-border); }
        .brand { font-family: 'Rajdhani', sans-serif; font-size: 1.5rem; font-weight: 900; letter-spacing: 1px; color: white; text-decoration: none; }
        .brand span { color: #06B6D4; }

        .glass-module { background: var(--glass-base); backdrop-filter: blur(16px); border: 1px solid var(--glass-border); border-radius: 20px; padding: 25px; transition: 0.3s; }
        .college-card:hover { border-color: var(--neon-primary); transform: translateY(-4px); box-shadow: 0 15px 30px rgba(0,0,0,0.5); }
        
        .select-filter { background: rgba(0,0,0,0.5); border: 1px solid var(--glass-border); color: white; padding: 12px 20px; border-radius: 12px; outline: none; font-weight: 600; font-size: 0.9rem; cursor: pointer; transition: 0.3s; width: 100%; }
        .select-filter:focus { border-color: var(--neon-primary); box-shadow: 0 0 15px rgba(59,130,246,0.2); }

        footer { text-align: center; padding: 20px; border-top: 1px solid var(--glass-border); color: #64748B; font-size: 0.8rem; margin-top: auto; }
    </style>
</head>
<body>
    <div class="grid-bg"></div>

    <nav>
        <a href="index.html" class="brand">CAREER<span>PILOT</span></a>
        <a href="index.html" class="text-xs font-bold text-slate-400 uppercase tracking-widest hover:text-blue-400 text-decoration-none">← Dashboard</a>
    </nav>

    <main class="flex-grow max-w-6xl mx-auto w-full p-4 md:p-8">
        <header class="mb-10 text-center">
            <h1 style="font-family: 'Rajdhani';" class="text-4xl md:text-5xl font-black uppercase tracking-tighter text-white mb-2">College <span class="text-blue-500">Matrix</span></h1>
            <p class="text-slate-400 text-sm">Filter elite engineering, medical, and global institutions.</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-10 bg-slate-900/50 p-6 rounded-2xl border border-slate-800">
            <select id="regionFilter" class="select-filter" onchange="filterColleges()">
                <option value="all">All Regions</option>
                <option value="ap">Andhra Pradesh / TS</option>
                <option value="national">National (IIT/NIT)</option>
                <option value="global">Global (US/UK)</option>
            </select>
            <select id="streamFilter" class="select-filter" onchange="filterColleges()">
                <option value="all">All Streams</option>
                <option value="engineering">Engineering (B.Tech)</option>
                <option value="medical">Medical (MBBS)</option>
            </select>
            <button class="bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-xl transition-colors uppercase tracking-widest text-sm" onclick="filterColleges()">Deploy Filter</button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="college-grid">
            </div>
    </main>

    <footer>&copy; 2026 AstraForge CareerPilot Network.</footer>

    <script>
        const colleges = [
            { name: "IIT Madras", region: "national", stream: "engineering", location: "Chennai, India", exams: "JEE Advanced", rating: "Tier 1", tierColor: "text-purple-400" },
            { name: "MIT (Massachusetts Inst. of Tech)", region: "global", stream: "engineering", location: "Cambridge, USA", exams: "SAT, IELTS", rating: "Global Elite", tierColor: "text-amber-400" },
            { name: "Andhra University (AUCE)", region: "ap", stream: "engineering", location: "Visakhapatnam, AP", exams: "AP EAPCET", rating: "State Tier 1", tierColor: "text-blue-400" },
            { name: "AIIMS Delhi", region: "national", stream: "medical", location: "New Delhi, India", exams: "NEET UG", rating: "Tier 1", tierColor: "text-purple-400" },
            { name: "NIT Warangal", region: "ap", stream: "engineering", location: "Telangana, India", exams: "JEE Main", rating: "Tier 1", tierColor: "text-purple-400" },
            { name: "Stanford University", region: "global", stream: "engineering", location: "California, USA", exams: "SAT, TOEFL", rating: "Global Elite", tierColor: "text-amber-400" },
            { name: "JNTU Kakinada", region: "ap", stream: "engineering", location: "Kakinada, AP", exams: "AP EAPCET", rating: "State Tier 1", tierColor: "text-blue-400" },
            { name: "SVU Tirupati", region: "ap", stream: "engineering", location: "Tirupati, AP", exams: "AP EAPCET", rating: "State Tier 1", tierColor: "text-blue-400" }
        ];

        function filterColleges() {
            const reg = document.getElementById('regionFilter').value;
            const str = document.getElementById('streamFilter').value;
            const grid = document.getElementById('college-grid');
            grid.innerHTML = '';
            
            let matched = false;
            colleges.forEach(col => {
                if ((reg === 'all' || col.region === reg) && (str === 'all' || col.stream === str)) {
                    matched = true;
                    grid.innerHTML += `
                        <div class="glass-module college-card flex flex-col justify-between">
                            <div>
                                <div class="flex justify-between items-start mb-4">
                                    <span class="text-xs font-bold uppercase tracking-widest text-slate-400">${col.location}</span>
                                    <span class="text-[10px] font-black uppercase tracking-widest ${col.tierColor} bg-slate-900 px-2 py-1 rounded">${col.rating}</span>
                                </div>
                                <h3 class="text-2xl font-bold text-white mb-4">${col.name}</h3>
                                <div class="bg-black/40 border border-slate-800 p-3 rounded-lg mb-4">
                                    <div class="text-[10px] text-slate-500 uppercase font-bold tracking-widest mb-1">Gateway Exam</div>
                                    <div class="text-sm font-bold text-emerald-400">${col.exams}</div>
                                </div>
                            </div>
                            <button class="w-full bg-slate-800 hover:bg-slate-700 border border-slate-600 text-white py-3 rounded-xl font-bold uppercase tracking-widest text-xs transition-colors mt-2">View Analysis</button>
                        </div>
                    `;
                }
            });
            if(!matched) grid.innerHTML = `<div class="col-span-full text-center text-slate-500 py-10 font-bold">No data found for this matrix configuration.</div>`;
        }

        filterColleges();
    </script>
</body>
</html>
