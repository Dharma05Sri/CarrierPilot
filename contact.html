<!DOCTYPE html>
<html lang="en">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-5HVBHX1KDW"></script>
    <script>window.dataLayer = window.dataLayer || []; function gtag(){dataLayer.push(arguments);} gtag('js', new Date()); gtag('config', 'G-5HVBHX1KDW');</script>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1495090071076386" crossorigin="anonymous"></script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Command | CareerPilot</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@700;900&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { background-color: #020617; color: #F8FAFC; font-family: 'Inter', sans-serif; }
        .glass-module { background: rgba(15, 23, 42, 0.5); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 24px; padding: 40px; }
        nav { background: rgba(2, 6, 23, 0.85); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255, 255, 255, 0.08); }
        .form-input { width: 100%; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); padding: 16px; border-radius: 12px; color: white; outline: none; transition: 0.3s; }
        .form-input:focus { border-color: #06B6D4; box-shadow: 0 0 15px rgba(6,182,212,0.2); }
    </style>
</head>
<body class="flex flex-col min-h-screen">
    <nav class="sticky top-0 w-full p-4 md:px-8 flex justify-between items-center z-50">
        <a href="index.html" class="text-2xl font-black text-white" style="font-family: 'Rajdhani';">CAREER<span class="text-cyan-400">PILOT</span></a>
        <a href="index.html" class="text-xs font-bold text-slate-400 uppercase tracking-widest hover:text-cyan-400">← Back to OS</a>
    </nav>

    <main class="flex-grow max-w-3xl mx-auto w-full p-6 mt-10 mb-10">
        <div class="glass-module">
            <h1 class="text-4xl font-black mb-2 text-white uppercase tracking-tighter" style="font-family: 'Rajdhani';">Initialize <span class="text-cyan-400">Transmission</span></h1>
            <p class="text-slate-400 text-sm mb-8">For partnership inquiries, data corrections, or technical support, transmit your payload below.</p>
            
            <form action="mailto:contact@astraforage.in" method="post" enctype="text/plain" class="space-y-5">
                <div>
                    <label class="block text-xs font-bold uppercase text-slate-500 mb-2 tracking-widest">System ID (Name)</label>
                    <input type="text" name="name" class="form-control form-input" required>
                </div>
                <div>
                    <label class="block text-xs font-bold uppercase text-slate-500 mb-2 tracking-widest">Return Protocol (Email)</label>
                    <input type="email" name="email" class="form-control form-input" required>
                </div>
                <div>
                    <label class="block text-xs font-bold uppercase text-slate-500 mb-2 tracking-widest">Query Payload</label>
                    <textarea name="message" rows="5" class="form-control form-input resize-none" required></textarea>
                </div>
                <button type="submit" class="w-full bg-cyan-500 text-slate-900 py-4 rounded-xl font-black uppercase tracking-widest hover:bg-white transition-colors">Transmit Data</button>
            </form>
        </div>
    </main>

    <footer class="text-center p-8 border-t border-slate-800 text-slate-500 text-xs">
        <p>&copy; 2026 AstraForge CareerPilot Network. All operational rights reserved.</p>
    </footer>
</body>
</html>
