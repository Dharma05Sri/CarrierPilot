        function renderCard(cardId, data, isGold) {
            const card = document.getElementById(cardId);
            const color = isGold ? 'var(--gold)' : 'var(--neon-primary)';
            
            const salWidth = data.salaryRaw;
            const riskWidth = data.riskRaw;
            const diffWidth = data.diffRaw;
            const wlbWidth = data.wlbRaw;

            let riskColor = 'var(--success)';
            if(data.riskRaw > 30) riskColor = '#F59E0B'; 
            if(data.riskRaw > 60) riskColor = 'var(--danger)';

            // DYNAMIC COLLEGE INJECTION LOGIC
            const matchedColleges = globalColleges.filter(c => c.courses.includes(data.courseCode)).slice(0, 2);
            let collegeHtml = '';
            if(matchedColleges.length > 0) {
                collegeHtml = `
                <div class="bg-black/50 border border-white/10 p-5 rounded-2xl mb-6 mt-6">
                    <h3 class="text-xs font-bold text-slate-500 uppercase tracking-widest mb-3 border-b border-white/10 pb-2">Top Target Institutions</h3>
                    ${matchedColleges.map(c => `

                            <div>
                                <div class="text-white font-bold text-sm">${c.name}</div>
                                <div class="text-slate-400 text-[10px] uppercase">${c.city}</div>
                            </div>
                            <div style="color: ${color};" class="font-black text-sm">QS #${c.rank}</div>
                        </div>
                    `).join('')}
                </div>`;
            }

            card.innerHTML = `
                <div class="mb-6">
                    <div class="tag-container">
                        ${data.tags.map(t => `<span class="tag" style="border-color:${color}; color:${color}; background:transparent;">${t}</span>`).join('')}
                    </div>
                    <h2 class="text-3xl font-black text-white uppercase tracking-tighter mb-2" style="font-family: 'Rajdhani';">${data.title}</h2>

                document.getElementById('card1').style.opacity = 1;
                document.getElementById('card2').style.opacity = 1;
            }, 300);
