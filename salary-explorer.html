<!DOCTYPE html>
<html lang="en">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-5HVBHX1KDW"></script>
    <script>window.dataLayer = window.dataLayer || []; function gtag(){dataLayer.push(arguments);} gtag('js', new Date()); gtag('config', 'G-5HVBHX1KDW');</script>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1495090071076386" crossorigin="anonymous"></script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salary Explorer | CareerPilot Intelligence</title>
    
    <meta name="description" content="Explore live salary data, peak earning potential, and automation risk for elite careers in Engineering, Finance, Medicine, and Law.">
    <meta name="keywords" content="salary explorer, career salary data, top paying jobs, AI risk jobs, career pilot salary, career growth">
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [{
        "@type": "Question",
        "name": "Which careers are immune to AI automation?",
        "acceptedAnswer": { "@type": "Answer", "text": "Medical surgery, complex legal litigation, and high-level strategy roles remain high-human-touch and low-AI-risk." }
      }]
    }
    </script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700;900&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        :root { --bg-deep: #020617; --glass-base: rgba(15, 23, 42, 0.6); --glass-border: rgba(255, 255, 255, 0.08); --neon-primary: #10B981; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg-deep); color: #F8FAFC; font-family: 'Inter', sans-serif; display: flex; flex-direction: column; min-height: 100vh; overflow-x: hidden; }
        .grid-bg { position: fixed; inset: 0; background-image: linear-gradient(var(--glass-border) 1px, transparent 1px), linear-gradient(90deg, var(--glass-border) 1px, transparent 1px); background-size: 40px 40px; z-index: -2; opacity: 0.3; }
        
        nav { position: sticky; top: 0; width: 100%; padding: 15px 30px; background: rgba(2, 6, 23, 0.9); backdrop-filter: blur(20px); display: flex; justify-content: space-between; align-items: center; z-index: 1000; border-bottom: 1px solid var(--glass-border); }
        .brand { font-family: 'Rajdhani', sans-serif; font-size: 1.5rem; font-weight: 900; letter-spacing: 1px; color: white; text-decoration: none; }
        .brand span { color: var(--neon-primary); }

        .search-hero { padding: 60px 20px; text-align: center; border-bottom: 1px solid var(--glass-border); }
        .search-input { width: 100%; max-width: 650px; background: rgba(0,0,0,0.6); border: 2px solid var(--glass-border); padding: 20px 30px; border-radius: 20px; color: white; outline: none; font-size: 1.1rem; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .search-input:focus { border-color: var(--neon-primary); box-shadow: 0 0 20px rgba(16,185,129,0.2); }

        .salary-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 25px; max-width: 1400px; margin: 40px auto; padding: 0 20px; }
        .salary-card { background: var(--glass-base); backdrop-filter: blur(15px); border: 1px solid var(--glass-border); border-radius: 20px; padding: 30px; transition: 0.3s; }
        .salary-card:hover { border-color: var(--neon-primary); transform: translateY(-5px); }

        footer { text-align: center; padding: 40px 20px; border-top: 1px solid var(--glass-border); color: #64748B; font-size: 0.8rem; margin-top: auto; }
        .footer-links a { color: #94A3B8; text-decoration: none; margin: 0 15px; font-weight: 700; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div class="grid-bg"></div>

    <nav>
        <a href="index.html" class="brand">🚀 CAREER<span>PILOT</span></a>
        <a href="index.html" class="text-xs font-bold text-slate-400 uppercase tracking-widest hover:text-emerald-400 text-decoration-none">← Dashboard</a>
    </nav>

    <div class="search-hero">
        <h1 style="font-family: 'Rajdhani';" class="text-5xl font-black uppercase tracking-tighter text-white mb-4">Salary <span class="text-emerald-400">Explorer</span></h1>
        <input type="text" id="salarySearch" class="search-input" placeholder="Search by role (e.g., 'Pilot', 'AI Engineer', 'Doctor')..." onkeyup="filterSalaries()">
    </div>

    <main id="salary-grid" class="salary-grid"></main>

    <footer>
        <div class="footer-links mb-4">
            <a href="about.html">About</a>
            <a href="privacy.html">Privacy</a>
            <a href="terms.html">Terms</a>
            <a href="disclaimer.html">Disclaimer</a>
        </div>
        <p>&copy; 2026 AstraForge CareerPilot Network.</p>
    </footer>

    <script>
        const salaryData = [
            { title: "AI/ML Engineer", stream: "MPC/CSE", fresher: "12L", avg: "28L", peak: "1.2Cr", demand: "Critical", risk: "Low" },
            { title: "Quantitative Trader", stream: "MPC/Math", fresher: "20L", avg: "55L", peak: "3Cr", demand: "High", risk: "Medium" },
            { title: "Neurosurgeon", stream: "BiPC/MBBS", fresher: "15L", avg: "40L", peak: "2.5Cr", demand: "High", risk: "Zero" },
            { title: "Corporate Lawyer", stream: "CLAT/Law", fresher: "10L", avg: "30L", peak: "1.5Cr", demand: "Medium", risk: "Medium" },
            { title: "Commercial Pilot", stream: "MPC", fresher: "20L", avg: "45L", peak: "1.5Cr", demand: "Medium", risk: "High" },
            { title: "DevOps Architect", stream: "MPC/IT", fresher: "10L", avg: "25L", peak: "70L", demand: "High", risk: "Low" },
            { title: "Blockchain Dev", stream: "MPC/CSE", fresher: "12L", avg: "35L", peak: "90L", demand: "High", risk: "Medium" },
            { title: "Data Scientist", stream: "MPC/Stats", fresher: "8L", avg: "22L", peak: "60L", demand: "Extreme", risk: "Low" },
            { title: "Investment Banker", stream: "Any/MBA", fresher: "12L", avg: "35L", peak: "1Cr", demand: "Medium", risk: "Medium" },
            { title: "Product Manager", stream: "Any/MBA", fresher: "10L", avg: "30L", peak: "80L", demand: "High", risk: "Low" }
        ];

        function renderGrid(data) {
            const grid = document.getElementById('salary-grid');
            grid.innerHTML = data.map(job => `
                <div class="salary-card" onclick="awardXP()">
                    <div class="flex justify-between items-center mb-4">
                        <span class="text-[10px] font-black uppercase tracking-widest bg-emerald-900/30 text-emerald-400 px-3 py-1 rounded-full">${job.demand} Demand</span>
                        <span class="text-[10px] font-black uppercase tracking-widest bg-slate-800 text-slate-400 px-3 py-1 rounded-full">${job.risk} Risk</span>
                    </div>
                    <h3 class="text-xl font-black text-white mb-1">${job.title}</h3>
                    <p class="text-xs text-slate-500 font-bold mb-6">${job.stream}</p>
                    
                    <div class="grid grid-cols-3 gap-2 text-center border-t border-slate-800 pt-4">
                        <div><div class="text-[9px] text-slate-500 uppercase font-bold">Fresher</div><div class="text-sm font-black text-blue-400">${job.fresher}</div></div>
                        <div><div class="text-[9px] text-slate-500 uppercase font-bold">Average</div><div class="text-sm font-black text-cyan-400">${job.avg}</div></div>
                        <div><div class="text-[9px] text-slate-500 uppercase font-bold">Peak</div><div class="text-sm font-black text-emerald-400">${job.peak}</div></div>
                    </div>
                </div>
            `).join('');
        }

        function filterSalaries() {
            const q = document.getElementById('salarySearch').value.toLowerCase();
            renderGrid(salaryData.filter(j => j.title.toLowerCase().includes(q)));
        }

        function awardXP() {
            let xp = parseInt(localStorage.getItem('pilot_xp')) || 250;
            xp += 5;
            localStorage.setItem('pilot_xp', xp);
            document.getElementById('nav-level').innerText = Math.floor(xp / 500) + 1;
        }

        renderGrid(salaryData);
    </script>
</body>
</html>
