<!DOCTYPE html>
<html lang="en">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-5HVBHX1KDW"></script>
    <script>window.dataLayer = window.dataLayer || []; function gtag(){dataLayer.push(arguments);} gtag('js', new Date()); gtag('config', 'G-5HVBHX1KDW');</script>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1495090071076386" crossorigin="anonymous"></script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Explore live salary data, peak earning potential, and automation risk for elite careers.">
    <title>Salary Explorer | CareerPilot</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700;900&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-deep: #020617; 
            --glass-base: rgba(15, 23, 42, 0.6);
            --glass-border: rgba(255, 255, 255, 0.08);
            --neon-primary: #10B981; /* Emerald for Financial Data */
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg-deep); color: #F8FAFC; font-family: 'Inter', sans-serif; overflow-x: hidden; display: flex; flex-direction: column; min-height: 100vh; }

        .grid-bg { position: fixed; inset: 0; background-image: linear-gradient(var(--glass-border) 1px, transparent 1px), linear-gradient(90deg, var(--glass-border) 1px, transparent 1px); background-size: 30px 30px; z-index: -2; opacity: 0.3; }

        nav { position: sticky; top: 0; width: 100%; padding: 15px 30px; background: rgba(2, 6, 23, 0.85); backdrop-filter: blur(20px); display: flex; justify-content: space-between; align-items: center; z-index: 1000; border-bottom: 1px solid var(--glass-border); }
        .brand { font-family: 'Rajdhani', sans-serif; font-size: 1.5rem; font-weight: 900; letter-spacing: 1px; color: white; text-decoration: none; }
        .brand span { color: #06B6D4; }

        .search-container { position: relative; max-width: 600px; margin: 0 auto 40px; }
        .search-input { width: 100%; background: rgba(0,0,0,0.5); border: 2px solid var(--glass-border); padding: 18px 25px; border-radius: 16px; color: white; outline: none; transition: 0.3s; font-size: 1.1rem; }
        .search-input:focus { border-color: var(--neon-primary); box-shadow: 0 0 20px rgba(16,185,129,0.2); }

        /* Bento Cards for Salary */
        .salary-card { background: var(--glass-base); backdrop-filter: blur(16px); border: 1px solid var(--glass-border); border-radius: 20px; padding: 25px; transition: 0.3s; animation: fadeIn 0.5s ease-out forwards; }
        .salary-card:hover { border-color: rgba(16,185,129,0.4); transform: translateY(-3px); box-shadow: 0 15px 30px rgba(0,0,0,0.5); }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .growth-bar-container { width: 100%; height: 6px; background: rgba(0,0,0,0.5); border-radius: 3px; margin: 15px 0; overflow: hidden; display: flex; }
        .bar-fresher { background: #3B82F6; }
        .bar-senior { background: #06B6D4; }
        .bar-peak { background: #10B981; }

        .tag-stream { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 4px 10px; border-radius: 6px; font-size: 0.7rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; color: #94A3B8; }

        footer { text-align: center; padding: 20px; border-top: 1px solid var(--glass-border); color: #64748B; font-size: 0.8rem; margin-top: auto; }
    </style>
</head>
<body>

    <div class="grid-bg"></div>

    <nav>
        <a href="index.html" class="brand">CAREER<span>PILOT</span></a>
        <a href="index.html" class="text-xs font-bold text-slate-400 uppercase tracking-widest hover:text-emerald-400 text-decoration-none">← Dashboard</a>
    </nav>

    <main class="flex-grow max-w-6xl mx-auto w-full p-4 md:p-8">
        
        <header class="mb-8 text-center">
            <h1 style="font-family: 'Rajdhani';" class="text-4xl md:text-5xl font-black uppercase tracking-tighter text-white mb-2">Compensation <span class="text-emerald-400">Matrix</span></h1>
            <p class="text-slate-400 text-sm">Search and analyze domestic & global earning trajectories.</p>
        </header>

        <div class="search-container">
            <input type="text" id="salarySearch" class="search-input" placeholder="Search 'Software Engineer', 'CA', 'Surgeon'..." onkeyup="filterSalaries()">
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="salary-grid">
            </div>

    </main>

    <footer>&copy; 2026 AstraForge CareerPilot Network.</footer>

    <script>
        const salaryData = [
            {
                title: "AI / Machine Learning Engineer", stream: "MPC (B.Tech CSE)",
                fresher: "₹8L - ₹15L", average: "₹25L", peak: "₹60L - ₹1Cr+",
                f_w: "20%", a_w: "30%", p_w: "50%",
                demand: "Extreme", risk: "Low"
            },
            {
                title: "Quantitative Analyst (Finance)", stream: "MPC / Math",
                fresher: "₹15L - ₹25L", average: "₹40L", peak: "₹1Cr - ₹3Cr+",
                f_w: "15%", a_w: "25%", p_w: "60%",
                demand: "High", risk: "Low"
            },
            {
                title: "Clinical Surgeon (MS/MD)", stream: "BiPC (MBBS)",
                fresher: "₹10L - ₹15L", average: "₹30L", peak: "₹60L - ₹2Cr+",
                f_w: "10%", a_w: "30%", p_w: "60%",
                demand: "High", risk: "Very Low"
            },
            {
                title: "Chartered Accountant (CA)", stream: "MEC / CEC",
                fresher: "₹8L - ₹12L", average: "₹20L", peak: "₹40L - ₹80L+",
                f_w: "20%", a_w: "40%", p_w: "40%",
                demand: "High", risk: "Medium"
            },
            {
                title: "Commercial Airline Pilot", stream: "MPC Required",
                fresher: "₹15L - ₹24L", average: "₹40L", peak: "₹80L - ₹1.2Cr",
                f_w: "25%", a_w: "45%", p_w: "30%",
                demand: "Medium", risk: "Medium"
            },
            {
                title: "Corporate Lawyer (Tier-1 Firm)", stream: "Any (CLAT)",
                fresher: "₹14L - ₹18L", average: "₹35L", peak: "₹80L - ₹2Cr+",
                f_w: "15%", a_w: "35%", p_w: "50%",
                demand: "Medium", risk: "Low"
            },
            {
                title: "Data Scientist", stream: "MPC / B.Tech",
                fresher: "₹7L - ₹12L", average: "₹22L", peak: "₹50L - ₹80L+",
                f_w: "25%", a_w: "40%", p_w: "35%",
                demand: "High", risk: "Low"
            },
            {
                title: "Aerospace Engineer", stream: "MPC (B.Tech)",
                fresher: "₹6L - ₹10L", average: "₹18L", peak: "₹40L - ₹60L+",
                f_w: "30%", a_w: "40%", p_w: "30%",
                demand: "Medium", risk: "Low"
            },
            {
                title: "Civil Services Officer (IAS/IPS)", stream: "Any Degree",
                fresher: "₹7L - ₹10L", average: "₹15L", peak: "₹30L+ (Perks excluded)",
                f_w: "40%", a_w: "40%", p_w: "20%",
                demand: "Extreme", risk: "Zero"
            }
        ];

        function renderGrid(data) {
            const grid = document.getElementById('salary-grid');
            grid.innerHTML = '';
            
            data.forEach(job => {
                grid.innerHTML += `
                    <div class="salary-card">
                        <div class="flex justify-between items-start mb-3">
                            <span class="tag-stream">${job.stream}</span>
                            <span class="text-[10px] uppercase font-bold tracking-widest ${job.risk === 'Low' || job.risk === 'Very Low' || job.risk === 'Zero' ? 'text-emerald-400' : 'text-amber-400'} border ${job.risk === 'Low' || job.risk === 'Very Low' || job.risk === 'Zero' ? 'border-emerald-800 bg-emerald-900/20' : 'border-amber-800 bg-amber-900/20'} px-2 py-1 rounded">Risk: ${job.risk}</span>
                        </div>
                        <h2 class="text-xl font-bold text-white mb-4 leading-tight">${job.title}</h2>
                        
                        <div class="space-y-3">
                            <div class="flex justify-between items-end">
                                <div class="text-[10px] text-slate-500 uppercase font-bold tracking-widest">Entry Level</div>
                                <div class="font-bold text-blue-400 text-sm">${job.fresher}</div>
                            </div>
                            <div class="flex justify-between items-end">
                                <div class="text-[10px] text-slate-500 uppercase font-bold tracking-widest">Mid-Senior Avg</div>
                                <div class="font-bold text-cyan-400 text-sm">${job.average}</div>
                            </div>
                            <div class="flex justify-between items-end border-t border-slate-800 pt-2">
                                <div class="text-[10px] text-slate-400 uppercase font-bold tracking-widest">Peak / Top 1%</div>
                                <div class="font-black text-emerald-400 text-lg">${job.peak}</div>
                            </div>
                        </div>

                        <div class="growth-bar-container">
                            <div class="bar-fresher" style="width: ${job.f_w};"></div>
                            <div class="bar-senior" style="width: ${job.a_w};"></div>
                            <div class="bar-peak" style="width: ${job.p_w};"></div>
                        </div>
                        
                        <div class="flex justify-between text-[9px] text-slate-500 uppercase font-bold tracking-widest">
                            <span>Growth Curve</span>
                            <span class="text-white">Demand: ${job.demand}</span>
                        </div>
                    </div>
                `;
            });
        }

        function filterSalaries() {
            const query = document.getElementById('salarySearch').value.toLowerCase();
            const filtered = salaryData.filter(job => 
                job.title.toLowerCase().includes(query) || 
                job.stream.toLowerCase().includes(query)
            );
            renderGrid(filtered);
        }

        // Init
        renderGrid(salaryData);
    </script>
</body>
</html>
