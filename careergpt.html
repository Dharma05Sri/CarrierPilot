<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CareerGPT | Pro Logic Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #020617; font-family: 'Inter', sans-serif; height: 100dvh; display: flex; flex-direction: column; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .typing-dot { animation: pulse 1.4s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
    </style>
</head>
<body>
    <div class="flex-grow overflow-y-auto p-4 space-y-4" id="chat-box">
        <div class="glass p-4 rounded-xl max-w-[85%] text-sm">
            <strong>System:</strong> Logic Engine initialized. Ask your career trajectory question.
        </div>
    </div>

    <div class="p-4 glass border-t border-white/10">
        <div class="flex gap-2">
            <input type="text" id="user-input" class="flex-grow bg-slate-950 p-3 rounded-lg border border-slate-700 focus:border-cyan-500 outline-none text-white" placeholder="Type your inquiry...">
            <button onclick="processInput()" class="bg-cyan-600 px-6 py-2 rounded-lg font-bold text-white hover:bg-cyan-500 transition-all">SEND</button>
        </div>
    </div>

    <script>
        // The Brain: A Score-Based Heuristic Database
        const KNOWLEDGE_DB = [
            { 
                tags: ['salary', 'money', 'pay', 'earn', 'wealth'], 
                response: "<strong>Salary Outlook:</strong> Career scalability depends on 'leverage'. In software and AI, you sell your time once but the code works infinitely. Target ₹40L-80L+ brackets by mastering system architecture, not just coding syntax." 
            },
            { 
                tags: ['ai', 'artificial intelligence', 'ml', 'machine learning', 'data'], 
                response: "<strong>AI/ML Roadmap:</strong> This is a math-heavy discipline. Roadmap: Linear Algebra -> Calculus -> Python -> Deep Learning (PyTorch/TensorFlow) -> MLOps. <strong>Verdict:</strong> Highest ROI if you can bridge the gap between high-level math and real-world deployment." 
            },
            { 
                tags: ['cse', 'computer science', 'coding', 'b.tech'], 
                response: "<strong>CSE Engineering:</strong> Don't just learn syntax. Focus on Algorithms, Operating Systems, and Distributed Systems. The industry is saturated with coders; it is desperate for problem solvers." 
            },
            { 
                tags: ['sat', 'usa', 'abroad', 'scholarship', 'foreign'], 
                response: "<strong>Global Strategy:</strong> You need a 'Spike' in your profile. A 1550+ SAT is the baseline, not the differentiator. Differentiate with documented research, open-source contributions, or startup projects. Financial aid is easier if your profile is rare." 
            },
            { 
                tags: ['mpc', 'intermediate', 'math', 'physics'], 
                response: "<strong>MPC Core:</strong> This is the engineering bedrock. Your goal in Intermediate is not just to clear the exam, but to master the underlying physics logic. It is the gatekeeper to IIT/BITS/Ivy League." 
            }
        ];

        function processInput() {
            const input = document.getElementById('user-input');
            const chat = document.getElementById('chat-box');
            const query = input.value.trim();
            if(!query) return;

            // Display user message
            chat.innerHTML += `<div class="bg-blue-600 p-3 rounded-xl self-end max-w-[85%] text-sm ml-auto">${query}</div>`;
            input.value = '';

            // Simulate "Thinking"
            const thinkingId = 'thinking';
            chat.innerHTML += `<div id="${thinkingId}" class="glass p-3 rounded-xl max-w-[20%] text-xs flex gap-1"><div class="typing-dot">●</div><div class="typing-dot" style="animation-delay:0.2s">●</div><div class="typing-dot" style="animation-delay:0.4s">●</div></div>`;
            chat.scrollTop = chat.scrollHeight;

            // Algorithm: Calculate relevance score
            const queryWords = query.toLowerCase().split(' ');
            let bestMatch = null;
            let highestScore = 0;

            KNOWLEDGE_DB.forEach(entry => {
                let score = 0;
                entry.tags.forEach(tag => {
                    if(query.toLowerCase().includes(tag)) score += 10;
                    queryWords.forEach(word => { if(word === tag) score += 5; });
                });
                if(score > highestScore) {
                    highestScore = score;
                    bestMatch = entry.response;
                }
            });

            // Fallback response
            const response = bestMatch || "I have analyzed your query. To maximize your career output, I recommend focusing on domains where high-skill complexity meets high-market demand (e.g., AI/ML or Quant Finance). Try asking about 'Salary', 'AI', or 'SAT'.";

            // Delayed rendering to mimic real API response time
            setTimeout(() => {
                document.getElementById(thinkingId).remove();
                chat.innerHTML += `<div class="glass p-4 rounded-xl max-w-[85%] text-sm">${response}</div>`;
                chat.scrollTop = chat.scrollHeight;
            }, 800 + Math.random() * 1000);
        }
    </script>
</body>
</html>
