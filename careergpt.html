<!DOCTYPE html>
<html lang="en">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-5HVBHX1KDW"></script>
    <script>window.dataLayer = window.dataLayer || []; function gtag(){dataLayer.push(arguments);} gtag('js', new Date()); gtag('config', 'G-5HVBHX1KDW');</script>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1495090071076386" crossorigin="anonymous"></script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ask CareerGPT | CareerPilot</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700;900&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        :root { --bg-deep: #020617; --glass-base: rgba(15, 23, 42, 0.9); --glass-border: rgba(255, 255, 255, 0.08); --neon-primary: #06B6D4; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        /* Mobile Viewport Fix */
        body { background-color: var(--bg-deep); color: #F8FAFC; font-family: 'Inter', sans-serif; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }

        .grid-bg { position: fixed; inset: 0; background-image: linear-gradient(var(--glass-border) 1px, transparent 1px), linear-gradient(90deg, var(--glass-border) 1px, transparent 1px); background-size: 30px 30px; z-index: -2; opacity: 0.3; }

        nav { padding: 15px 20px; background: rgba(2, 6, 23, 0.95); border-bottom: 1px solid var(--glass-border); display: flex; justify-content: space-between; align-items: center; z-index: 100; flex-shrink: 0; }
        .brand { font-family: 'Rajdhani', sans-serif; font-size: 1.5rem; font-weight: 900; letter-spacing: 1px; color: white; text-decoration: none; }
        .brand span { color: var(--neon-primary); }

        /* Chat Architecture */
        .chat-container { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 20px; max-width: 800px; margin: 0 auto; width: 100%; scroll-behavior: smooth; }
        .chat-container::-webkit-scrollbar { width: 4px; }
        .chat-container::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

        .message { max-width: 85%; padding: 16px 20px; border-radius: 16px; font-size: 0.95rem; line-height: 1.6; animation: slideUp 0.3s ease-out forwards; opacity: 0; transform: translateY(10px); word-wrap: break-word; }
        .msg-user { align-self: flex-end; background: rgba(59, 130, 246, 0.15); border: 1px solid rgba(59, 130, 246, 0.3); color: white; border-bottom-right-radius: 4px; }
        .msg-ai { align-self: flex-start; background: rgba(15, 23, 42, 0.9); border: 1px solid var(--glass-border); color: #cbd5e1; border-bottom-left-radius: 4px; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        
        .msg-ai strong { color: white; font-weight: 700; }
        .msg-ai ul { padding-left: 20px; margin-top: 10px; margin-bottom: 10px; }
        .msg-ai li { margin-bottom: 6px; }

        @keyframes slideUp { to { opacity: 1; transform: translateY(0); } }

        .typing-indicator { display: flex; gap: 5px; padding: 10px 20px; align-items: center; }
        .typing-dot { width: 8px; height: 8px; background: var(--neon-primary); border-radius: 50%; animation: typing 1.4s infinite ease-in-out; opacity: 0.5; }
        .typing-dot:nth-child(1) { animation-delay: 0s; }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typing { 0%, 100% { transform: translateY(0); opacity: 0.5; } 50% { transform: translateY(-4px); opacity: 1; } }

        /* Fixed Input Area for Mobile */
        .input-area { padding: 15px; background: rgba(2, 6, 23, 0.95); border-top: 1px solid var(--glass-border); flex-shrink: 0; padding-bottom: max(15px, env(safe-area-inset-bottom)); }
        .input-wrapper { max-width: 800px; margin: 0 auto; position: relative; display: flex; gap: 10px; }
        .chat-input { flex-grow: 1; background: rgba(15, 23, 42, 0.8); border: 1px solid var(--glass-border); padding: 14px 18px; border-radius: 12px; color: white; outline: none; transition: 0.3s; font-size: 1rem; }
        .chat-input:focus { border-color: var(--neon-primary); box-shadow: 0 0 15px rgba(6,182,212,0.1); }
        .send-btn { background: var(--neon-primary); color: #020617; padding: 0 20px; border-radius: 12px; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; border: none; cursor: pointer; font-family: 'Rajdhani', sans-serif; font-size: 1.1rem; }
        .send-btn:hover { background: white; }

        .suggestion-chips { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 10px; max-width: 800px; margin: 0 auto 10px; -webkit-overflow-scrolling: touch; }
        .suggestion-chips::-webkit-scrollbar { display: none; }
        .chip { background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1); padding: 8px 16px; border-radius: 20px; font-size: 0.8rem; color: #94A3B8; cursor: pointer; white-space: nowrap; transition: 0.2s; flex-shrink: 0; }
        .chip:hover { border-color: var(--neon-primary); color: white; }
    </style>
</head>
<body>

    <div class="grid-bg"></div>

    <nav>
        <a href="index.html" class="brand">CAREER<span>GPT</span></a>
        <a href="index.html" class="text-xs font-bold text-slate-400 uppercase tracking-widest hover:text-cyan-400 text-decoration-none">← Exit</a>
    </nav>

    <div class="chat-container" id="chat-box">
        <div class="message msg-ai">
            <h3 class="text-white font-bold mb-2 font-['Rajdhani'] text-xl tracking-wide flex items-center gap-2"><span class="text-cyan-400">🤖</span> Engine Online</h3>
            <p>I am CareerGPT. I process data on streams, global salaries, and university pathways.</p>
            <p class="mt-2 text-cyan-400 text-sm font-bold uppercase tracking-widest">Provide your query in detail...</p>
        </div>
    </div>

    <div class="input-area">
        <div class="suggestion-chips">
            <button class="chip" onclick="fillInput('What is the roadmap to become an AI Engineer?')">AI Engineer Roadmap</button>
            <button class="chip" onclick="fillInput('Can I get a zero-investment scholarship in the USA?')">Zero-Investment USA</button>
            <button class="chip" onclick="fillInput('Compare CSE and ECE for future salary.')">CSE vs ECE</button>
            <button class="chip" onclick="fillInput('What are the best exams to write after Intermediate MPC?')">Exams after MPC</button>
        </div>
        <div class="input-wrapper">
            <input type="text" id="user-input" class="chat-input" placeholder="Type your career question..." onkeypress="if(event.key === 'Enter') sendMessage()">
            <button class="send-btn" onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');

        function fillInput(text) {
            userInput.value = text;
            userInput.focus();
        }

        // --- DYNAMIC ALGORITHMIC ENGINE ---
        // This engine constructs unique responses by combining data blocks rather than returning a single fixed string.
        function generateDynamicResponse(query) {
            const text = query.toLowerCase();
            let response = "";

            // Keyword detection triggers
            const isTech = text.includes('ai') || text.includes('software') || text.includes('cse') || text.includes('computer') || text.includes('coding') || text.includes('python');
            const isEngineering = text.includes('engineering') || text.includes('b.tech') || text.includes('btech') || text.includes('mpc') || text.includes('ece');
            const isAbroad = text.includes('abroad') || text.includes('usa') || text.includes('scholarship') || text.includes('sat');
            const isCommerce = text.includes('commerce') || text.includes('ca') || text.includes('mec') || text.includes('cec');
            const isSalary = text.includes('salary') || text.includes('pay') || text.includes('money') || text.includes('highest');

            // 1. Diagnostic Block
            response += "<strong>System Diagnostic:</strong><br>";
            if (isTech) {
                response += "You are inquiring about the highest-scaling sector in the modern economy. Tech and AI architecture require intense logical deduction and mathematical baseline strength.<br><br>";
            } else if (isAbroad) {
                response += "Global educational pathways offer unmatched ROI, provided you can navigate the complex 'need-blind' financial aid frameworks without accumulating debt.<br><br>";
            } else if (isCommerce) {
                response += "The financial and corporate sectors offer immense wealth generation. This pathway is ideal if you possess high analytical skills but prefer to bypass pure theoretical sciences.<br><br>";
            } else if (isEngineering) {
                response += "Core engineering pathways demand absolute mastery of the MPC syllabus. The divergence between branches (like CSE vs Mechanical) will drastically dictate your future operational environment.<br><br>";
            } else {
                response += "I have analyzed your query parameters against our global database. To provide the most mathematically sound advice, we break this down into actionable vectors.<br><br>";
            }

            // 2. Actionable Roadmap / Detailed Explanation Block
            response += "<strong>Execution Strategy:</strong><br><ul>";
            
            if (isTech || (isEngineering && isSalary)) {
                response += "<li><strong>Stream Focus:</strong> Lock into the MPC stream. Superior command over Calculus and Physics is non-negotiable.</li>";
                response += "<li><strong>Skill Acquisition:</strong> Move beyond basic syntax. Begin 'paper coding' Python and mastering Data Structures and Algorithms (DSA) offline.</li>";
                response += "<li><strong>Degree Target:</strong> B.Tech in Computer Science or specialized Artificial Intelligence.</li>";
            } 
            
            if (isAbroad) {
                response += "<li><strong>Standardized Testing:</strong> Target a 1550+ on the SAT. Utilize specialized drills (like SAT Panda) alongside College Board baselines.</li>";
                response += "<li><strong>Profile Spikes:</strong> International admissions (US/UK) reject perfect scores without high-level extracurricular demonstrations (e.g., deployed coding projects).</li>";
            }
            
            if (isCommerce) {
                response += "<li><strong>Certification:</strong> The Chartered Accountancy (CA) route requires clearing the Foundation, Intermediate, and a grueling 3-year articleship.</li>";
                response += "<li><strong>Alternative:</strong> Consider Quantitative Finance or Actuarial Science for extremely high compensation with lower entry volume.</li>";
            }

            if (!isTech && !isAbroad && !isCommerce) {
                response += "<li><strong>First Step:</strong> Identify your cognitive baseline. Are you computationally driven (Math), memory driven, or logic/debate driven?</li>";
                response += "<li><strong>Evaluate the Matrix:</strong> Cross-reference your interest with the 'Future Demand Heatmap' on the dashboard to ensure the role won't be automated by 2035.</li>";
                response += "<li><strong>Financial Calculation:</strong> Use the Dream Salary Calculator to ensure the educational investment matches the peak earning potential.</li>";
            }
            response += "</ul><br>";

            // 3. Verdict / Conclusion Block
            if (isSalary) {
                response += "<strong>The Verdict:</strong> Maximize your compensation by positioning yourself where capital flow intersects with high technical complexity (e.g., AI Engineering or High-Frequency Trading).";
            } else if (isTech) {
                response += "<strong>The Verdict:</strong> The technology sector is brutal but highly rewarding. Focus entirely on building a verifiable portfolio of projects before you even enter university.";
            } else {
                response += "<strong>The Verdict:</strong> Ambiguity is the enemy of career progression. I strongly recommend running the 'Career DNA Test' on your dashboard to lock in a mathematically optimal trajectory.";
            }

            return response;
        }

        function sendMessage() {
            const text = userInput.value.trim();
            if(!text) return;

            // Render User Message
            const userMsg = document.createElement('div');
            userMsg.className = 'message msg-user';
            userMsg.innerText = text;
            chatBox.appendChild(userMsg);

            userInput.value = '';
            chatBox.scrollTop = chatBox.scrollHeight;

            // Render Typing Indicator
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message msg-ai typing-indicator';
            typingDiv.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';
            chatBox.appendChild(typingDiv);
            chatBox.scrollTop = chatBox.scrollHeight;

            // Simulate Network Processing Time
            setTimeout(() => {
                chatBox.removeChild(typingDiv);
                
                const aiMsg = document.createElement('div');
                aiMsg.className = 'message msg-ai';
                aiMsg.innerHTML = generateDynamicResponse(text);
                chatBox.appendChild(aiMsg);
                chatBox.scrollTop = chatBox.scrollHeight;
            }, 1000 + Math.random() * 1000); // Random delay between 1-2 seconds for realism
        }
    </script>
</body>
</html>
