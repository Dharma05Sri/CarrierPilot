<!DOCTYPE html>
<html lang="en">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-5HVBHX1KDW"></script>
    <script>window.dataLayer = window.dataLayer || []; function gtag(){dataLayer.push(arguments);} gtag('js', new Date()); gtag('config', 'G-5HVBHX1KDW');</script>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1495090071076386" crossorigin="anonymous"></script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Generate step-by-step academic roadmaps for elite global careers.">
    <title>Future Simulator | CareerPilot</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700;900&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-deep: #020617; 
            --glass-base: rgba(15, 23, 42, 0.6);
            --glass-border: rgba(255, 255, 255, 0.08);
            --neon-primary: #06B6D4;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg-deep); color: #F8FAFC; font-family: 'Inter', sans-serif; overflow-x: hidden; display: flex; flex-direction: column; min-height: 100vh; }

        .grid-bg { position: fixed; inset: 0; background-image: linear-gradient(var(--glass-border) 1px, transparent 1px), linear-gradient(90deg, var(--glass-border) 1px, transparent 1px); background-size: 30px 30px; z-index: -2; opacity: 0.3; }
        
        nav { position: sticky; top: 0; width: 100%; padding: 15px 30px; background: rgba(2, 6, 23, 0.85); backdrop-filter: blur(20px); display: flex; justify-content: space-between; align-items: center; z-index: 1000; border-bottom: 1px solid var(--glass-border); }
        .brand { font-family: 'Rajdhani', sans-serif; font-size: 1.5rem; font-weight: 900; letter-spacing: 1px; color: white; text-decoration: none; }
        .brand span { color: var(--neon-primary); }

        .glass-module { background: var(--glass-base); backdrop-filter: blur(20px); border: 1px solid var(--glass-border); border-radius: 24px; padding: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.5); }

        /* Timeline UI */
        .timeline { position: relative; padding-left: 40px; margin-top: 30px; border-left: 2px solid rgba(6,182,212,0.3); }
        .timeline-item { position: relative; margin-bottom: 30px; animation: slideIn 0.5s ease-out forwards; opacity: 0; transform: translateX(-20px); }
        .timeline-item::before { content: ''; position: absolute; left: -46px; top: 0px; width: 12px; height: 12px; border-radius: 50%; background: var(--neon-primary); box-shadow: 0 0 12px var(--neon-primary); }
        
        /* Staggered Animation */
        .timeline-item:nth-child(1) { animation-delay: 0.1s; }
        .timeline-item:nth-child(2) { animation-delay: 0.2s; }
        .timeline-item:nth-child(3) { animation-delay: 0.3s; }
        .timeline-item:nth-child(4) { animation-delay: 0.4s; }
        .timeline-item:nth-child(5) { animation-delay: 0.5s; }

        @keyframes slideIn { to { opacity: 1; transform: translateX(0); } }

        .skill-tag { background: rgba(6,182,212,0.1); border: 1px solid rgba(6,182,212,0.3); color: var(--neon-primary); padding: 6px 12px; border-radius: 8px; font-size: 0.75rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }

        footer { text-align: center; padding: 20px; border-top: 1px solid var(--glass-border); color: #64748B; font-size: 0.8rem; margin-top: auto; }
    </style>
</head>
<body>

    <div class="grid-bg"></div>

    <nav>
        <a href="index.html" class="brand">CAREER<span>PILOT</span></a>
        <a href="index.html" class="text-xs font-bold text-slate-400 uppercase tracking-widest hover:text-cyan-400 text-decoration-none">← Dashboard</a>
    </nav>

    <main class="flex-grow max-w-5xl mx-auto w-full p-4 md:p-8">
        <header class="mb-10 text-center">
            <h1 style="font-family: 'Rajdhani';" class="text-4xl md:text-5xl font-black uppercase tracking-tighter text-white mb-2">Future <span class="text-cyan-400">Simulator</span></h1>
            <p class="text-slate-400 text-sm">Select your target destination. We generate the execution protocol.</p>
        </header>

        <div class="glass-module mb-8">
            <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-3">Target Trajectory</label>
            <select id="sim-selector" class="w-full bg-slate-900 border border-slate-700 p-4 rounded-xl text-white font-bold outline-none focus:border-cyan-400 transition-colors cursor-pointer appearance-none" onchange="renderSimulator()">
                <option value="ai">AI & Machine Learning Engineer (Global Tech)</option>
                <option value="quant">Quantitative Analyst (Hedge Funds)</option>
                <option value="law">Corporate Litigator (Tier-1 Firm)</option>
                <option value="pilot">Commercial Airline Captain</option>
            </select>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <div class="md:col-span-2 glass-module">
                <h2 class="text-xl font-bold text-white uppercase tracking-widest border-b border-slate-800 pb-3 mb-6" style="font-family: 'Rajdhani';">Execution Timeline</h2>
                <div class="timeline" id="timeline-container">
                    </div>
            </div>

            <div class="space-y-6">
                <div class="glass-module p-6 text-center">
                    <div class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-1">Peak Compensation</div>
                    <div class="text-3xl font-black text-emerald-400" id="stat-salary">₹0L+</div>
                    <div class="border-t border-slate-800 my-4"></div>
                    <div class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-1">Automation Risk</div>
                    <div class="text-lg font-bold text-cyan-400" id="stat-risk">Calculating...</div>
                </div>

                <div class="glass-module p-6">
                    <h3 class="text-xs font-bold text-white uppercase tracking-widest mb-4">Required Skill Arsenal</h3>
                    <div class="flex flex-wrap gap-2" id="stat-skills">
                        </div>
                </div>

                <div class="bg-amber-900/20 border border-amber-500/30 rounded-2xl p-6">
                    <h3 class="text-xs font-bold text-amber-400 uppercase tracking-widest mb-2 flex items-center gap-2"><span>⚡</span> Contingency Pivot</h3>
                    <p class="text-sm text-slate-300 leading-relaxed" id="stat-pivot">Fallback plan logic.</p>
                </div>
            </div>
        </div>

    </main>

    <footer>&copy; 2026 AstraForge CareerPilot Network.</footer>

    <script>
        const simData = {
            ai: {
                salary: "₹40L - ₹80L+", risk: "Low (Automation Builders)",
                skills: ["Python Architecture", "Linear Algebra", "Data Structures", "Neural Networks"],
                pivot: "A rigorous mathematical and algorithmic foundation allows an immediate pivot into Data Science, Product Management, or launching a high-growth SaaS startup.",
                timeline: [
                    { phase: "Intermediate (Class 11/12)", desc: "Lock into the MPC stream. Focus intensely on Calculus and Physics. Begin mastering Python fundamentals through offline, theoretical 'paper coding' to build unbreakable logical intuition." },
                    { phase: "Standardized Testing", desc: "Execute a zero-investment global admissions strategy. Target a 1550+ SAT score utilizing 7 College Board baselines, 10 specialized SAT Panda drills, and 3 Princeton Review 2026 simulations." },
                    { phase: "B.Tech (CSE / AI & ML)", desc: "Enroll in a premier undergraduate engineering program. Shift focus from basic syntax to complex Data Structures and Algorithms (DSA) and building proprietary machine learning models." },
                    { phase: "Industry Integration", desc: "Secure internships at tech titans (Google/Meta/Microsoft) by demonstrating a portfolio of deployed, functional AI tools, bypassing traditional recruitment bottlenecks." }
                ]
            },
            quant: {
                salary: "₹50L - ₹1Cr+", risk: "Minimal",
                skills: ["C++ / Python", "Stochastic Calculus", "Algorithmic Trading", "Probability"],
                pivot: "If the intense pressure of Wall Street/Dalal Street isn't preferred, pivoting to Actuarial Science or Enterprise Risk Management is seamless and highly lucrative.",
                timeline: [
                    { phase: "Intermediate (Class 11/12)", desc: "Dominate the MPC stream. The entire career rests on elite-level mathematical competence and raw computational speed." },
                    { phase: "Undergraduate Study", desc: "Pursue Mathematics, Statistics, or Computer Science at a Tier-1 institute (IITs/ISI). Participate relentlessly in competitive programming." },
                    { phase: "Specialized Masters (Optional)", desc: "Obtain a Master's in Financial Engineering (MFE) to master derivatives pricing and stochastic models." },
                    { phase: "Hedge Fund Deployment", desc: "Write high-frequency trading algorithms for proprietary trading firms, moving millions of dollars in milliseconds." }
                ]
            },
            law: {
                salary: "₹18L - ₹45L+", risk: "Medium (Research Automated)",
                skills: ["Contract Law", "High-Speed Reading", "Negotiation", "Logical Reasoning"],
                pivot: "A law degree from a premier institute provides immense leverage for entering Civil Services (UPSC), Corporate Strategy, or Public Policy.",
                timeline: [
                    { phase: "Intermediate (Class 11/12)", desc: "Any stream is valid, though HEC/CEC/MEC are common. Develop voracious reading habits and flawless logical deduction skills." },
                    { phase: "The CLAT Gateway", desc: "Clear the Common Law Admission Test (CLAT) with an elite rank to secure a seat at a top-3 National Law University (NLU)." },
                    { phase: "BA-LLB (5 Years)", desc: "Maintain a high GPA, participate in international moot court competitions, and secure internships with Tier-1 law firms every semester." },
                    { phase: "Day-Zero Placement", desc: "Get recruited directly from campus by massive corporate firms managing international mergers, acquisitions, and IP rights." }
                ]
            },
            pilot: {
                salary: "₹2L - ₹8L / Month", risk: "Medium (Autopilot Advances)",
                skills: ["Spatial Awareness", "Aerodynamics", "Meteorology", "Crisis Management"],
                pivot: "If grounded due to strict DGCA medicals, aviation knowledge translates directly into Air Traffic Control (ATC), Drone Fleet Management, or Aviation Operations.",
                timeline: [
                    { phase: "Intermediate (Class 11/12)", desc: "MPC is strictly mandatory. Obtain DGCA Class 2 and Class 1 Medical clearances before committing any finances to flight training." },
                    { phase: "Ground School & Flying", desc: "Enroll in a reputed flight academy (India, USA, or South Africa). Clear DGCA ground papers (Navigation, Meteorology, Aviation Law)." },
                    { phase: "CPL Acquisition", desc: "Log the mandatory 200 hours of flight time to earn your Commercial Pilot License (CPL)." },
                    { phase: "Type Rating & Induction", desc: "Invest in a Type Rating for a specific aircraft (e.g., Airbus A320, Boeing 737) and get inducted into a commercial airline as a First Officer." }
                ]
            }
        };

        function renderSimulator() {
            const val = document.getElementById('sim-selector').value;
            const data = simData[val];

            document.getElementById('stat-salary').innerText = data.salary;
            document.getElementById('stat-risk').innerText = data.risk;
            document.getElementById('stat-pivot').innerText = data.pivot;

            let skillsHTML = '';
            data.skills.forEach(s => skillsHTML += `<span class="skill-tag">${s}</span>`);
            document.getElementById('stat-skills').innerHTML = skillsHTML;

            let tlHTML = '';
            data.timeline.forEach(t => {
                tlHTML += `
                    <div class="timeline-item">
                        <h3 class="text-lg font-bold text-cyan-400 mb-1">${t.phase}</h3>
                        <p class="text-sm text-slate-300 leading-relaxed">${t.desc}</p>
                    </div>
                `;
            });
            document.getElementById('timeline-container').innerHTML = tlHTML;
        }

        // Initialize on load
        renderSimulator();
    </script>
</body>
</html>
